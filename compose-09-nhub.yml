services:
  # 1. Banco de Dados
  postgres:
    image: postgres:16
    container_name: nicerp_db
    environment:
      POSTGRES_USER: nicerp_user
      POSTGRES_PASSWORD: nicerp_password
      POSTGRES_DB: nicerp_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - nic_net
    restart: unless-stopped

  # 2. pgAdmin (Painel do Banco)
  pgadmin:
    image: dpage/pgadmin4
    container_name: nicerp_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nicerp.com
      PGADMIN_DEFAULT_PASSWORD: admin
    networks:
      - nic_net
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.erp-pgadmin.rule=Host(`pgadmin-hub.nic-labs.com`)"
      - "traefik.http.routers.erp-pgadmin.entrypoints=websecure"
      - "traefik.http.routers.erp-pgadmin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.erp-pgadmin.middlewares=nic-security"
      - "traefik.http.services.erp-pgadmin.loadbalancer.server.port=80"

  # 3. Back-end (Spring Boot)
  api:
    build: 
      # PADRÃO ANSIBLE NIC-LABS: Caminho Absoluto
      context: /opt/nic-labs/core/n-hub/erp
      dockerfile: Dockerfile
    container_name: nicerp_api
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nicerp_db
      SPRING_DATASOURCE_USERNAME: nicerp_user
      SPRING_DATASOURCE_PASSWORD: nicerp_password
    networks:
      - nic_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.erp-api.rule=Host(`api-hub.nic-labs.com`)"
      - "traefik.http.routers.erp-api.entrypoints=websecure"
      - "traefik.http.routers.erp-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.erp-api.middlewares=nic-security"
      - "traefik.http.services.erp-api.loadbalancer.server.port=8080"

  # 4. Front-end (React + Nginx)
  frontend:
    build: 
      # PADRÃO ANSIBLE NIC-LABS: Caminho Absoluto
      context: /opt/nic-labs/core/n-hub/frontend
      dockerfile: Dockerfile
    container_name: nicerp_frontend
    restart: always
    networks:
      - nic_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.erp-front.rule=Host(`hub.nic-labs.com`)"
      - "traefik.http.routers.erp-front.entrypoints=websecure"
      - "traefik.http.routers.erp-front.tls.certresolver=letsencrypt"
      - "traefik.http.routers.erp-front.middlewares=nic-security"
      - "traefik.http.services.erp-front.loadbalancer.server.port=80"

volumes:
  pgdata:

networks:
  nic_net:
    external: true