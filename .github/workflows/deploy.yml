name: Deploy NIC-ERP no Servidor

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Baixar código fonte atualizado
        uses: actions/checkout@v4

      - name: Sincronização e Build (Padrão apps_core)
        run: |
          CODIGO="/opt/nic-labs/core/n-hub"
          COMPOSE="/opt/nic-labs/core/compose-09-nhub.yml"
          
          # 1. Garante que o runner é dono do diretório destino (evita Permission Denied no rsync)
          sudo chown -R $(whoami):$(whoami) $CODIGO

          # 2. Sincroniza o código fonte do projeto
          rsync -av --exclude='.git/' ./ $CODIGO/

          # 2. Copia o compose para o local padrão do core
          sudo cp $CODIGO/compose.yml $COMPOSE
          
          # 3. Para apenas os containers do ERP e remove as imagens
          #    (Outros serviços críticos NÃO são afetados pois não estão neste compose)
          cd /opt/nic-labs/core && docker compose -f $COMPOSE down --rmi all

          # 3.1 Remove containers órfãos pelo nome (de projetos anteriores)
          docker rm -f erp_db erp_backend erp_frontend 2>/dev/null || true

          # 4. Limpa cache e builders travados do BuildKit sem reiniciar o Docker
          docker builder prune -f
          docker buildx rm default 2>/dev/null || true
          docker buildx create --use --name default 2>/dev/null || true

          # 5. Build sequencial e sobe os containers do ERP
          cd /opt/nic-labs/core && docker compose -f $COMPOSE build --no-cache erp_backend
          cd /opt/nic-labs/core && docker compose -f $COMPOSE build --no-cache erp_frontend

          # 5.1 Verifica JWT_SECRET antes de subir (falha rápido com mensagem clara)
          JWT_LEN=$(docker run --rm --env-file /opt/nic-labs/core/secrets/erp_backend.env alpine sh -c 'echo -n "${#NIC_ERP_JWT_SECRET}"')
          echo "✅ NIC_ERP_JWT_SECRET length in secrets file: $JWT_LEN chars"
          if [ "$JWT_LEN" -lt 32 ]; then
            echo "❌ NIC_ERP_JWT_SECRET must be at least 32 characters in /opt/nic-labs/core/secrets/erp_backend.env"
            exit 1
          fi

          # 5.2 Diagnóstico: mostra se o runner tem NIC_ERP_JWT_SECRET no próprio ambiente
          echo "=== DIAGNOSTIC: Runner shell NIC_ERP_JWT_SECRET length: ${#NIC_ERP_JWT_SECRET} chars ==="

          # 5.3 Garante valores corretos das variáveis críticas
          export NIC_ERP_JWT_SECRET="$(grep '^NIC_ERP_JWT_SECRET=' /opt/nic-labs/core/secrets/erp_backend.env | tail -1 | cut -d= -f2-)"
          export ADMIN_SEED_PASSWORD="$(grep '^ADMIN_SEED_PASSWORD=' /opt/nic-labs/core/secrets/erp_backend.env | tail -1 | cut -d= -f2-)"
          echo "=== DIAGNOSTIC: NIC_ERP_JWT_SECRET after loading from secrets: ${#NIC_ERP_JWT_SECRET} chars ==="
          echo "=== DIAGNOSTIC: ADMIN_SEED_PASSWORD after loading: ${#ADMIN_SEED_PASSWORD} chars ==="

          # 5.4 Verifica que o compose file no servidor tem o bloco environment para NIC_ERP_JWT_SECRET
          echo "=== DIAGNOSTIC: NIC_ERP_JWT_SECRET in compose file ==="
          grep -A3 "NIC_ERP_JWT_SECRET" $COMPOSE || echo "WARNING: NIC_ERP_JWT_SECRET not found in $COMPOSE"

          # 5.5 Mostra o que Docker Compose realmente resolve para NIC_ERP_JWT_SECRET
          echo "=== DIAGNOSTIC: docker compose resolved NIC_ERP_JWT_SECRET length ==="
          RESOLVED_JWT=$(cd /opt/nic-labs/core && docker compose -f $COMPOSE config 2>/dev/null | grep '^\s*NIC_ERP_JWT_SECRET:' | head -1 | sed 's/.*NIC_ERP_JWT_SECRET: //' | tr -d '"'"'"'')
          echo "=== DIAGNOSTIC: Resolved NIC_ERP_JWT_SECRET length: ${#RESOLVED_JWT} chars ==="
          RESOLVED_ADMIN=$(cd /opt/nic-labs/core && docker compose -f $COMPOSE config 2>/dev/null | grep '^\s*ADMIN_SEED_PASSWORD:' | head -1 | sed 's/.*ADMIN_SEED_PASSWORD: //' | tr -d '"'"'"'')
          echo "=== DIAGNOSTIC: Resolved ADMIN_SEED_PASSWORD length: ${#RESOLVED_ADMIN} chars ==="

          cd /opt/nic-labs/core && docker compose -f $COMPOSE up -d
          
      - name: Limpar lixo do Docker
        run: docker image prune -f && docker builder prune -f