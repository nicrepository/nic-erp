- name: Sincronização e Deploy (Sem Sudo)
        run: |
          CAMINHO_SERVIDOR="/opt/nic-labs/core/n-hub"
          
          # 1. Sincroniza os ficheiros (O runner já é o dono desta pasta)
          rsync -av --exclude='.git/' ./ $CAMINHO_SERVIDOR/
          
          # 2. Entra na pasta do N-HUB
          cd $CAMINHO_SERVIDOR
          
          # 3. Roda o Docker Compose (O runner já está no grupo 'docker')
          docker compose -f compose-09-nhub.yml build --no-cache
          docker compose -f compose-09-nhub.yml up -d --remove-orphans
          
      - name: Limpar lixo do Docker
        run: docker image prune -f && docker builder prune -f