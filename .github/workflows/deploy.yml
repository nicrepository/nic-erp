name: Deploy N-HUB no Servidor

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Baixar código fonte atualizado
        uses: actions/checkout@v4

      - name: Sincronização e Build (Padrão apps_core)
        run: |
          CAMINHO_SERVIDOR="/opt/nic-labs/core/n-hub"
          
          # 1. Sincroniza apenas o código fonte do projeto
          rsync -av --exclude='.git/' ./ $CAMINHO_SERVIDOR/
          
          # 2. Sai da pasta do projeto e vai para a RAIZ do CORE (Exatamente como o Ansible trabalha)
          cd /opt/nic-labs/core
          
          # 3. Roda o build usando o arquivo oficial que já está na raiz
          docker compose -f compose-09-nhub.yml build --no-cache
          docker compose -f compose-09-nhub.yml up -d --remove-orphans
          
      - name: Limpar lixo do Docker
        run: docker image prune -f && docker builder prune -f