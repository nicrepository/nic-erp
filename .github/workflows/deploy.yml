name: Deploy N-HUB no Servidor

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Baixar código fonte atualizado
        uses: actions/checkout@v4

      - name: Sincronizar arquivos e reiniciar Docker
        run: |
          CAMINHO_SERVIDOR="/opt/nic-labs/core/n-hub"
          mkdir -p $CAMINHO_SERVIDOR
          rsync -av --exclude='.git/' ./ $CAMINHO_SERVIDOR/
          cd $CAMINHO_SERVIDOR

          # 1. Força o build do zero absoluto, ignorando qualquer cache travado
          docker compose -f compose-09-nhub.yml build --no-cache
          
          # 2. Sobe os containers com as imagens novas
          docker compose -f compose-09-nhub.yml up -d
          
      - name: Limpar lixo do Docker
        run: docker image prune -f && docker builder prune -f