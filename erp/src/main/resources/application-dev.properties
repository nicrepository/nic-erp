# ============================================================
# PERFIL DE DESENVOLVIMENTO (spring.profiles.active=dev)
# Estes valores sao seguros apenas para uso local.
# NUNCA use estes valores em producao.
# ============================================================

# JWT — chave de desenvolvimento (minimo 32 chars)
api.security.token.secret=dev-secret-key-NOT-for-production-use-1234

# Admin seed — senha inicial do admin local
admin.seed.password=admin123

# E-mail — em dev, pode apontar para Mailtrap ou deixar inativo
spring.mail.username=dev@example.com

# SQL visivel no console apenas em dev
spring.jpa.show-sql=true
