spring.application.name=erp

# ----------------------------------------
# CONEXÃO COM O BANCO DE DADOS (DOCKER)
# ----------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/nicerp_db
spring.datasource.username=nicerp_user
spring.datasource.password=nicerp_password
spring.datasource.driver-class-name=org.postgresql.Driver

# ----------------------------------------
# CONFIGURAÇÕES DO JPA / HIBERNATE
# ----------------------------------------
# O 'validate' garante que o Hibernate não crie ou altere tabelas sozinho.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ----------------------------------------
# CONFIGURAÇÃO DO FLYWAY
# ----------------------------------------
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ----------------------------------------
# CONFIGURACOES DE UPLOAD DE ARQUIVOS
# ----------------------------------------

# Tamanho máximo de um único arquivo (Ex: 10 Megabytes)
spring.servlet.multipart.max-file-size=10MB

# Tamanho máximo da requisição inteira (caso envie vários arquivos de uma vez)
spring.servlet.multipart.max-request-size=15MB

# Pasta física no seu Ubuntu onde as imagens serão salvas
# Usamos ${user.home} para salvar direto na pasta do seu usuário (ex: /home/caio/nic-erp-uploads)
file.upload-dir=${user.home}/nic-erp-uploads