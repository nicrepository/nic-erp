spring.application.name=erp

# ----------------------------------------
# BANCO DE DADOS
# ----------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nicerp_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:nicerp_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:nicerp_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ----------------------------------------
# JPA / HIBERNATE
# ----------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true

# ----------------------------------------
# FLYWAY
# ----------------------------------------
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ----------------------------------------
# UPLOAD DE ARQUIVOS
# ----------------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
file.upload-dir=${FILE_UPLOAD_DIR:${user.home}/nic-erp-uploads}

# ----------------------------------------
# E-MAIL (SMTP)
# Obrigatorio em producao: SPRING_MAIL_USERNAME e SPRING_MAIL_PASSWORD
# ----------------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:dev@example.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

spring.devtools.restart.exclude=uploads/**

# ----------------------------------------
# JWT
# Obrigatorio em prod: defina NIC_ERP_JWT_SECRET com no minimo 32 chars via env var.
# O valor abaixo e usado APENAS para desenvolvimento local.
nic.erp.jwt.secret=${NIC_ERP_JWT_SECRET:dev-secret-key-NOT-for-production-use-1234}

# ----------------------------------------
# SEED DO USUARIO ADMINISTRADOR INICIAL
# Obrigatorio: ADMIN_SEED_PASSWORD (sem fallback — startup falha se não definido)
# ----------------------------------------
admin.seed.name=${ADMIN_SEED_NAME:Administrador}
admin.seed.email=${ADMIN_SEED_EMAIL:admin@nic-labs.com}
# A04/A07: Sem senha padrão. Defina ADMIN_SEED_PASSWORD via env var antes do primeiro boot.
admin.seed.password=${ADMIN_SEED_PASSWORD}

# ----------------------------------------
# FRONT-END
# Override APP_FRONTEND_URL in production (e.g. https://app.nic-labs.com)
# ----------------------------------------
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}