spring.application.name=erp

# ----------------------------------------
# CONEXï¿½O COM O BANCO DE DADOS (DOCKER)
# ----------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nicerp_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:nicerp_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:nicerp_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ----------------------------------------
# CONFIGURAï¿½ï¿½ES DO JPA / HIBERNATE
# ----------------------------------------
# O 'validate' garante que o Hibernate nï¿½o crie ou altere tabelas sozinho.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ----------------------------------------
# CONFIGURAï¿½ï¿½O DO FLYWAY
# ----------------------------------------
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ----------------------------------------
# CONFIGURACOES DE UPLOAD DE ARQUIVOS
# ----------------------------------------

# Tamanho mï¿½ximo de um ï¿½nico arquivo (Ex: 10 Megabytes)
spring.servlet.multipart.max-file-size=10MB

# Tamanho mï¿½ximo da requisiï¿½ï¿½o inteira (caso envie vï¿½rios arquivos de uma vez)
spring.servlet.multipart.max-request-size=15MB

# Pasta fï¿½sica no seu Ubuntu onde as imagens serï¿½o salvas
# Usamos ${user.home} para salvar direto na pasta do seu usuï¿½rio (ex: /home/caio/nic-erp-uploads)
file.upload-dir=${FILE_UPLOAD_DIR:${user.home}/nic-erp-uploads}

# --- CONFIGURACOES DE E-MAIL (SMTP GMAIL) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Coloque o e-mail real da sua empresa aqui
spring.mail.username=${SPRING_MAIL_USERNAME:kanecaplays@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:}

# Propriedades de seguranï¿½a do Spring Mail
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

spring.devtools.restart.exclude=uploads/**

# ----------------------------------------
# SEED DO USUARIO ADMINISTRADOR INICIAL
# ----------------------------------------
admin.seed.name=${ADMIN_SEED_NAME:Administrador}
admin.seed.email=${ADMIN_SEED_EMAIL:admin@nic-labs.com}
admin.seed.password=${ADMIN_SEED_PASSWORD:admin123}