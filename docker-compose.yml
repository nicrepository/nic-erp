version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: nicerp_db
    environment:
      POSTGRES_USER: nicerp_user
      POSTGRES_PASSWORD: nicerp_password
      POSTGRES_DB: nicerp_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: nicerp_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nicerp.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
