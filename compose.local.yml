name: nhub-local

services:
  erp_db:
    image: postgres:16-alpine
    container_name: erp_db_local
    restart: always
    environment:
      POSTGRES_DB: nic_erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - erp_db_data_local:/var/lib/postgresql/data
    networks:
      - nic_net_local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  erp_backend:
    build:
      context: ./erp
      dockerfile: Dockerfile
    container_name: erp_backend_local
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://erp_db:5432/nic_erp
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      NIC_ERP_JWT_SECRET: nic_erp_local_test_secret_123456789_abcdef
      ADMIN_SEED_EMAIL: admin@nic-labs.com
      ADMIN_SEED_PASSWORD: admin123
    ports:
      - "8080:8080"
    volumes:
      - erp_uploads_local:/app/uploads
    networks:
      - nic_net_local
    depends_on:
      erp_db:
        condition: service_healthy

  erp_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: erp_frontend_local
    restart: always
    ports:
      - "5173:80"
    networks:
      - nic_net_local
    depends_on:
      - erp_backend

volumes:
  erp_db_data_local:
    driver: local
  erp_uploads_local:
    driver: local

networks:
  nic_net_local:
    driver: bridge